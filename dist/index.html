<!DOCTYPE html>

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; image-rendering: pixelated; }

    /* Blank black overlay while the game boots — no spinner/text needed
       now that load is fast. briefingModal hides it once the modal mounts. */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      transition: opacity 0.3s ease-out;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
  </style>
